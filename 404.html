<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
color:white;
text-align:center;
}

.container{
padding:40px;
}

h1{
font-size:120px;
color:#38bdf8;
}

h2{
font-size:35px;
margin:15px 0;
}

p{
color:#cbd5e1;
margin-bottom:30px;
}

a{
display:inline-block;
padding:15px 35px;
background:#38bdf8;
color:white;
text-decoration:none;
border-radius:50px;
transition:.3s;
}

a:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you're looking for doesn't exist.
</p>

<a href="index.html">
Go Back Home
</a>

</div>

</body>
</html>
